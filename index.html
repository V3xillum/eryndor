<canvas id="fest-fx-canvas" aria-hidden="true"></canvas>
<canvas id="confetti-canvas" aria-hidden="true"></canvas>

<div class="page">
  <div class="scroll">

    <div class="title-block">
      <div class="scroll-title">Calendar of Eryndor</div>
      <div class="scroll-subtitle">Year of Exploration</div>
    </div>
    <div class="font-face-toggle font-face-toggle--floating" aria-label="Lettergrootte">
      <button type="button" class="font-face-toggle__trigger" aria-haspopup="menu" aria-expanded="false" data-tooltip="Lettergrootte">
        <span class="font-face-toggle__trigger-emoji" aria-hidden="true">🙂</span>
        <span class="font-face-toggle__chev" aria-hidden="true">▾</span>
      </button>
      <div class="font-face-toggle__menu" role="menu" aria-label="Kies lettergrootte">
        <button type="button" class="font-face-toggle__item" role="menuitem" data-font-scale="young">
          <span class="font-face-toggle__item-emoji" aria-hidden="true">😐</span> Kleine tekst
        </button>
        <button type="button" class="font-face-toggle__item" role="menuitem" data-font-scale="normal">
          <span class="font-face-toggle__item-emoji" aria-hidden="true">🙂</span> Normale tekst
        </button>
        <button type="button" class="font-face-toggle__item" role="menuitem" data-font-scale="reader">
          <span class="font-face-toggle__item-emoji" aria-hidden="true">🤓</span> Grotere tekst
        </button>
        <button type="button" class="font-face-toggle__item" role="menuitem" data-font-scale="grand">
          <span class="font-face-toggle__item-emoji" aria-hidden="true">👴</span> Opa tekst
        </button>
      </div>
    </div>
    <button class="jump-to-current-month jump-to-current-month--header" id="jump-to-current-month" type="button">
      Naar huidige maand
    </button>

    <div id="leap-year-notice-wrap"></div>
    <div id="calendar-debug-bar-wrap"></div>
    <div id="birthday-banner-container"></div>
    <div class="today-block" id="today-block"></div>
    <div class="next-up" id="next-up" aria-live="polite"></div>

    <div class="section-label">✦ &nbsp; Het Harptos-jaar &nbsp; ✦</div>
    <div class="months-grid" id="months-grid"></div>

    <!-- Legend directly below months -->
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:radial-gradient(circle at 40% 35%,#ffe566,#c9a010); border:1px solid rgba(92,66,0,0.25)"></div> Full Moon</div>
      <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(145deg,#8b6845,#5c3d22); border:1px solid rgba(90,56,24,0.35)"></div> New Moon</div>
      <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(145deg,#5a6b7c,#3d4f62); border:1px solid rgba(45,62,82,0.35)"></div> Dark Moon</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8b1a1a"></div> Today</div>
      <div class="legend-item"><span style="font-size:10px;line-height:1;margin-right:2px;">🎂</span> Verjaardag</div>
      <div class="legend-item"><span style="font-size:9px;line-height:1;margin-right:2px;">✦</span> Mijlpaal</div>
      <div class="legend-item"><span style="font-size:9px;line-height:1;margin-right:2px;">🕯</span> Herdenking</div>
    </div>

    <div class="ornate-divider">⸻ ✦ ⸻</div>

    <div class="section-label">✦ &nbsp; Verjaardagen &nbsp; ✦</div>
    <div class="birthday-list" id="birthday-list"></div>

    <div class="ornate-divider">⸻ ✦ ⸻</div>

    <div class="section-label">✦ &nbsp; Mijlpalen &amp; herinneringsdagen &nbsp; ✦</div>
    <div class="memorial-list" id="memorial-list"></div>

  </div>
</div>
 
<div id="tooltip-layer" class="tooltip-layer" aria-hidden="true">
  <div id="tooltip" class="tooltip" role="tooltip"></div>
</div>
