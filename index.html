<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar of Eryndor</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #f4e8c1;
    --parchment-dark: #e8d5a0;
    --parchment-deep: #d4ba7a;
    --ink: #1a0f00;
    --ink-fade: #3d2b0f;
    --ink-light: #5c3d1a;
    --crimson: #8b1a1a;
    --gold: #b8860b;
    --gold-light: #daa520;
    --gold-pale: #f0d060;
    --moon-yellow: #f5e27a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0d0800;
    background-image: radial-gradient(ellipse at 50% 0%, #1a0a00 0%, #0d0800 60%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    font-family: 'IM Fell English', serif;
    color: var(--ink);
    position: relative;
    /* Garland-rand (SVG): defaults goud / robijn */
    --garland-rope: #b8922a;
    --garland-rope-op: 0.72;
    --garland-stroke-w: 1.5;
    --garland-gem-a: #c9a010;
    --garland-gem-b: #9b2335;
    --garland-star: #f2c84a;
    --garland-ornament: #d64541;
    --garland-corner: #b33030;
    --garland-filter: brightness(1.03);
    --garland-dash: none; /* stroke-dasharray */
    --garland-linecap: butt;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,240,180,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,240,180,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 60% 10%, rgba(255,240,180,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 25%, rgba(255,240,180,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 70%, rgba(255,240,180,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 90% 55%, rgba(255,240,180,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 85%, rgba(255,240,180,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,240,180,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 50%, rgba(255,240,180,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ——— Body-thema: elke feestdag eigen duidelijke “scene” (body + ::before sterren + ::after motief) ——— */
  body { transition: background 0.85s ease, background-color 0.85s ease; }

  body[class*="fest-theme-"]::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    transition: opacity 0.85s ease;
  }

  /* Midwinter — ijsblauw, vorststrepen, sterke noorderlicht-achtige gloed */
  body.fest-theme-midwinter {
    background-color: #020810;
    background-image:
      repeating-linear-gradient(-48deg, transparent, transparent 11px, rgba(140, 210, 255, 0.07) 11px, rgba(140, 210, 255, 0.07) 12px),
      radial-gradient(ellipse 130% 85% at 50% -25%, rgba(160, 230, 255, 0.75) 0%, rgba(40, 100, 180, 0.25) 42%, transparent 58%),
      radial-gradient(ellipse 70% 55% at 0% 100%, rgba(30, 90, 160, 0.55) 0%, transparent 55%),
      radial-gradient(ellipse 70% 55% at 100% 100%, rgba(30, 90, 160, 0.55) 0%, transparent 55%),
      linear-gradient(185deg, #0c2038 0%, #02060c 55%, #010308 100%);
    --garland-rope: #7ec8f0;
    --garland-rope-op: 0.9;
    --garland-stroke-w: 1.65;
    --garland-gem-a: #d4f2ff;
    --garland-gem-b: #4a8ec8;
    --garland-star: #ffffff;
    --garland-ornament: #b8ecff;
    --garland-corner: #5ecfff;
    --garland-filter: drop-shadow(0 0 5px rgba(120, 210, 255, 0.55)) brightness(1.12);
    --garland-dash: 3 6;
    --garland-linecap: round;
  }
  body.fest-theme-midwinter::before {
    mix-blend-mode: screen;
    opacity: 0.95;
    background-image:
      radial-gradient(2px 2px at 8% 12%, rgba(220, 248, 255, 0.95) 0%, transparent 100%),
      radial-gradient(1px 1px at 22% 38%, rgba(180, 230, 255, 0.8) 0%, transparent 100%),
      radial-gradient(2.5px 2.5px at 58% 8%, rgba(255, 255, 255, 1) 0%, transparent 100%),
      radial-gradient(1px 1px at 82% 22%, rgba(200, 240, 255, 0.85) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 38% 68%, rgba(160, 220, 255, 0.7) 0%, transparent 100%),
      radial-gradient(2px 2px at 92% 52%, rgba(230, 250, 255, 0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 4% 78%, rgba(180, 230, 255, 0.65) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 72% 85%, rgba(220, 248, 255, 0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 48%, rgba(200, 235, 255, 0.55) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 88%, rgba(255, 255, 255, 0.75) 0%, transparent 100%),
      radial-gradient(2px 2px at 88% 78%, rgba(190, 235, 255, 0.85) 0%, transparent 100%);
  }
  body.fest-theme-midwinter::after {
    background:
      radial-gradient(ellipse 100% 40% at 50% 0%, rgba(100, 200, 255, 0.35) 0%, transparent 65%),
      radial-gradient(circle at 50% 18%, rgba(200, 240, 255, 0.2) 0%, transparent 35%);
  }

  /* Greengrass — levendig mosgroen, licht van onder (lente), verticale “ranken” */
  body.fest-theme-greengrass {
    background-color: #010502;
    background-image:
      repeating-linear-gradient(88deg, transparent, transparent 56px, rgba(60, 200, 90, 0.09) 56px, rgba(60, 200, 90, 0.09) 57px),
      radial-gradient(ellipse 110% 75% at 50% 115%, rgba(100, 255, 140, 0.55) 0%, rgba(40, 140, 60, 0.35) 35%, transparent 55%),
      radial-gradient(ellipse 50% 45% at 10% 15%, rgba(50, 180, 80, 0.45) 0%, transparent 50%),
      radial-gradient(ellipse 45% 40% at 92% 25%, rgba(70, 200, 100, 0.35) 0%, transparent 48%),
      linear-gradient(168deg, #051a0c 0%, #010302 50%, #000802 100%);
    --garland-rope: #3ecf6a;
    --garland-rope-op: 0.88;
    --garland-stroke-w: 1.55;
    --garland-gem-a: #c8ffc8;
    --garland-gem-b: #1e7a3a;
    --garland-star: #e8ff9a;
    --garland-ornament: #6ef08a;
    --garland-corner: #2ee86a;
    --garland-filter: drop-shadow(0 0 4px rgba(80, 255, 120, 0.45)) saturate(1.2);
    --garland-dash: none;
    --garland-linecap: round;
  }
  body.fest-theme-greengrass::before {
    mix-blend-mode: screen;
    opacity: 0.88;
    background-image:
      radial-gradient(2px 2px at 12% 18%, rgba(200, 255, 210, 0.95) 0%, transparent 100%),
      radial-gradient(1px 1px at 28% 42%, rgba(150, 255, 170, 0.75) 0%, transparent 100%),
      radial-gradient(2px 2px at 62% 12%, rgba(220, 255, 230, 1) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 30%, rgba(180, 250, 195, 0.8) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 72%, rgba(120, 240, 150, 0.65) 0%, transparent 100%),
      radial-gradient(2px 2px at 90% 58%, rgba(210, 255, 220, 0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 6% 82%, rgba(160, 245, 175, 0.7) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 68% 88%, rgba(200, 255, 210, 0.85) 0%, transparent 100%),
      radial-gradient(1px 1px at 52% 50%, rgba(170, 250, 185, 0.6) 0%, transparent 100%),
      radial-gradient(2px 2px at 24% 92%, rgba(230, 255, 235, 0.9) 0%, transparent 100%);
  }
  body.fest-theme-greengrass::after {
    background:
      radial-gradient(ellipse 80% 50% at 50% 100%, rgba(80, 220, 120, 0.25) 0%, transparent 60%),
      repeating-linear-gradient(105deg, transparent, transparent 18px, rgba(40, 160, 70, 0.06) 18px, rgba(40, 160, 70, 0.06) 19px);
  }

  /* Midsummer — felle zon bovenaan, stralen, warme gloed (sterk contrast met normale bruine nacht) */
  body.fest-theme-midsummer {
    background-color: #140800;
    background-image:
      repeating-conic-gradient(from 0deg at 50% -8%, rgba(255, 200, 60, 0.14) 0deg 6deg, transparent 6deg 14deg),
      radial-gradient(circle 85vw at 50% -18%, rgba(255, 252, 220, 0.95) 0%, rgba(255, 200, 80, 0.65) 18%, rgba(255, 120, 20, 0.35) 38%, transparent 62%),
      radial-gradient(ellipse 100% 70% at 50% 100%, rgba(80, 30, 0, 0.85) 0%, #060200 55%, #030100 100%);
    --garland-rope: #ffb020;
    --garland-rope-op: 0.92;
    --garland-stroke-w: 1.7;
    --garland-gem-a: #fff8c8;
    --garland-gem-b: #ff6a00;
    --garland-star: #fff566;
    --garland-ornament: #ffae00;
    --garland-corner: #ff8800;
    --garland-filter: drop-shadow(0 0 6px rgba(255, 200, 60, 0.75)) brightness(1.08);
    --garland-dash: none;
    --garland-linecap: round;
  }
  body.fest-theme-midsummer::before {
    mix-blend-mode: screen;
    opacity: 0.75;
    background-image:
      radial-gradient(2px 2px at 10% 20%, rgba(255, 240, 180, 1) 0%, transparent 100%),
      radial-gradient(1px 1px at 26% 45%, rgba(255, 220, 140, 0.85) 0%, transparent 100%),
      radial-gradient(2.5px 2.5px at 64% 15%, rgba(255, 250, 200, 1) 0%, transparent 100%),
      radial-gradient(1px 1px at 84% 32%, rgba(255, 210, 120, 0.9) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 36% 75%, rgba(255, 200, 100, 0.7) 0%, transparent 100%),
      radial-gradient(2px 2px at 92% 60%, rgba(255, 235, 160, 0.95) 0%, transparent 100%),
      radial-gradient(1px 1px at 4% 88%, rgba(255, 215, 130, 0.75) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 70% 82%, rgba(255, 225, 150, 0.88) 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 55%, rgba(255, 230, 170, 0.65) 0%, transparent 100%);
  }
  body.fest-theme-midsummer::after {
    background:
      radial-gradient(circle 50vw at 50% 5%, rgba(255, 255, 200, 0.35) 0%, transparent 45%),
      linear-gradient(180deg, rgba(255, 180, 40, 0.15) 0%, transparent 35%);
  }

  /* Highharvestide — amber / koper, schuine “aren”, rijke herfstgloed */
  body.fest-theme-highharvestide {
    background-color: #0a0300;
    background-image:
      repeating-linear-gradient(38deg, transparent, transparent 22px, rgba(255, 160, 50, 0.11) 22px, rgba(255, 160, 50, 0.11) 23px),
      radial-gradient(ellipse 115% 70% at 50% -5%, rgba(255, 170, 60, 0.7) 0%, rgba(180, 70, 10, 0.4) 38%, transparent 58%),
      radial-gradient(ellipse 55% 50% at 0% 85%, rgba(120, 40, 0, 0.65) 0%, transparent 55%),
      radial-gradient(ellipse 55% 50% at 100% 80%, rgba(100, 35, 0, 0.55) 0%, transparent 52%),
      linear-gradient(195deg, #2a1004 0%, #0c0400 45%, #050100 100%);
    --garland-rope: #e89830;
    --garland-rope-op: 0.9;
    --garland-stroke-w: 1.6;
    --garland-gem-a: #ffe8a8;
    --garland-gem-b: #a03808;
    --garland-star: #ffc040;
    --garland-ornament: #ff7818;
    --garland-corner: #d46810;
    --garland-filter: drop-shadow(0 0 4px rgba(255, 150, 50, 0.5)) saturate(1.15);
    --garland-dash: 5 4;
    --garland-linecap: butt;
  }
  body.fest-theme-highharvestide::before {
    mix-blend-mode: screen;
    opacity: 0.9;
    background-image:
      radial-gradient(2px 2px at 9% 14%, rgba(255, 220, 160, 1) 0%, transparent 100%),
      radial-gradient(1px 1px at 24% 40%, rgba(255, 190, 120, 0.85) 0%, transparent 100%),
      radial-gradient(2px 2px at 61% 10%, rgba(255, 235, 180, 1) 0%, transparent 100%),
      radial-gradient(1px 1px at 81% 26%, rgba(255, 200, 130, 0.88) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 37% 70%, rgba(255, 170, 90, 0.72) 0%, transparent 100%),
      radial-gradient(2px 2px at 91% 54%, rgba(255, 210, 150, 0.95) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 84%, rgba(255, 180, 100, 0.7) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 73% 86%, rgba(255, 215, 140, 0.82) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 48%, rgba(255, 200, 120, 0.62) 0%, transparent 100%),
      radial-gradient(2px 2px at 18% 90%, rgba(255, 230, 170, 0.92) 0%, transparent 100%);
  }
  body.fest-theme-highharvestide::after {
    background:
      radial-gradient(ellipse 90% 45% at 50% 0%, rgba(255, 140, 40, 0.3) 0%, transparent 55%),
      repeating-linear-gradient(-32deg, transparent, transparent 30px, rgba(200, 90, 20, 0.05) 30px, rgba(200, 90, 20, 0.05) 31px);
  }

  /* Feast of the Moon — diep paars, grote “maan”-schijf, zilveren lichtkegel */
  body.fest-theme-feastofthemoon {
    background-color: #030214;
    background-image:
      radial-gradient(circle 55vw at 72% 22%, rgba(255, 250, 230, 0.55) 0%, rgba(200, 190, 255, 0.22) 28%, rgba(80, 60, 140, 0.15) 48%, transparent 62%),
      radial-gradient(ellipse 130% 90% at 50% 110%, rgba(40, 20, 80, 0.75) 0%, transparent 50%),
      radial-gradient(ellipse 60% 70% at 15% 30%, rgba(100, 80, 180, 0.35) 0%, transparent 50%),
      linear-gradient(210deg, #120a28 0%, #050318 40%, #02010a 100%);
    --garland-rope: #c4b0f0;
    --garland-rope-op: 0.9;
    --garland-stroke-w: 1.6;
    --garland-gem-a: #f8f4ff;
    --garland-gem-b: #8870d0;
    --garland-star: #ffffff;
    --garland-ornament: #e0d4ff;
    --garland-corner: #c8a8ff;
    --garland-filter: drop-shadow(0 0 7px rgba(200, 180, 255, 0.6)) brightness(1.1);
    --garland-dash: none;
    --garland-linecap: round;
  }
  body.fest-theme-feastofthemoon::before {
    mix-blend-mode: screen;
    opacity: 0.92;
    background-image:
      radial-gradient(2px 2px at 11% 16%, rgba(240, 235, 255, 1) 0%, transparent 100%),
      radial-gradient(1px 1px at 27% 41%, rgba(210, 200, 255, 0.82) 0%, transparent 100%),
      radial-gradient(2px 2px at 63% 11%, rgba(255, 255, 255, 0.95) 0%, transparent 100%),
      radial-gradient(1px 1px at 79% 28%, rgba(220, 210, 255, 0.88) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 39% 73%, rgba(180, 170, 240, 0.68) 0%, transparent 100%),
      radial-gradient(2px 2px at 93% 56%, rgba(245, 240, 255, 0.92) 0%, transparent 100%),
      radial-gradient(1px 1px at 4% 81%, rgba(200, 190, 255, 0.72) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 71% 87%, rgba(230, 225, 255, 0.85) 0%, transparent 100%),
      radial-gradient(1px 1px at 47% 51%, rgba(210, 200, 255, 0.58) 0%, transparent 100%),
      radial-gradient(2px 2px at 86% 12%, rgba(255, 255, 255, 0.85) 0%, transparent 100%);
  }
  body.fest-theme-feastofthemoon::after {
    background:
      radial-gradient(ellipse 35% 90% at 72% 50%, rgba(200, 190, 255, 0.12) 0%, transparent 50%),
      radial-gradient(circle 28vw at 72% 22%, rgba(255, 255, 245, 0.18) 0%, transparent 45%);
  }

  /* Campaign-mijlpalen / herinneringsdagen — gedempt zilver & diepblauw (na feestdag, vóór of na jarige) */
  body.memorial-theme {
    background-color: #060810;
    background-image:
      radial-gradient(ellipse 70% 50% at 20% 30%, rgba(100, 140, 200, 0.22) 0%, transparent 50%),
      radial-gradient(ellipse 60% 45% at 85% 75%, rgba(80, 100, 150, 0.18) 0%, transparent 48%),
      linear-gradient(175deg, #0a0e18 0%, #040608 50%, #020408 100%);
    --garland-rope: #8a9ec4;
    --garland-rope-op: 0.88;
    --garland-stroke-w: 1.55;
    --garland-gem-a: #d8e4ff;
    --garland-gem-b: #4a5a8a;
    --garland-star: #c8d8f0;
    --garland-ornament: #a8b8d8;
    --garland-corner: #6a7aac;
    --garland-filter: drop-shadow(0 0 5px rgba(140, 160, 210, 0.45)) saturate(1.05);
    --garland-dash: 4 5;
    --garland-linecap: round;
  }
  body.memorial-theme::before {
    mix-blend-mode: screen;
    opacity: 0.78;
    background-image:
      radial-gradient(1.5px 1.5px at 12% 18%, rgba(200, 220, 255, 0.75) 0%, transparent 100%),
      radial-gradient(1px 1px at 28% 42%, rgba(160, 190, 240, 0.55) 0%, transparent 100%),
      radial-gradient(2px 2px at 62% 12%, rgba(220, 235, 255, 0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 30%, rgba(180, 200, 255, 0.65) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 72%, rgba(150, 175, 230, 0.45) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 58%, rgba(210, 225, 255, 0.7) 0%, transparent 100%);
  }
  body.memorial-theme::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(120, 150, 200, 0.12) 0%, transparent 55%);
  }

  /* Mijlpaal type: death — gevallen personage; zwart, sobere rand, geen feest */
  body.memorial-mourning-theme {
    background-color: #020202;
    background-image:
      radial-gradient(ellipse 55% 40% at 50% 0%, rgba(35, 35, 42, 0.5) 0%, transparent 55%),
      radial-gradient(ellipse 70% 50% at 80% 90%, rgba(20, 18, 28, 0.45) 0%, transparent 50%),
      linear-gradient(180deg, #050508 0%, #010101 45%, #000000 100%);
    --garland-rope: #3a3a44;
    --garland-rope-op: 0.75;
    --garland-stroke-w: 1.4;
    --garland-gem-a: #6a6a78;
    --garland-gem-b: #2a2a32;
    --garland-star: #8a8a96;
    --garland-ornament: #4a4a52;
    --garland-corner: #1c1c22;
    --garland-filter: drop-shadow(0 0 4px rgba(0, 0, 0, 0.9)) brightness(0.92);
    --garland-dash: 5 7;
    --garland-linecap: butt;
    /* Donker perkament + lichte inkt (cascade naar .scroll en inhoud) */
    --parchment: #2b2930;
    --parchment-dark: #222028;
    --parchment-deep: #18161c;
    --ink: #ebe7de;
    --ink-fade: #b8b3a8;
    --ink-light: #9a958a;
    --crimson: #c87878;
    --gold: #9a7d2e;
    --gold-light: #c4a238;
    --gold-pale: #dcc068;
    --moon-yellow: #c2b56e;
  }
  body.memorial-mourning-theme .scroll {
    background-image: radial-gradient(ellipse at 50% 0%, rgba(55, 52, 64, 0.9) 0%, var(--parchment) 46%);
    box-shadow:
      0 0 0 3px var(--parchment-deep),
      0 0 0 6px rgba(120, 100, 55, 0.5),
      0 0 0 8px var(--parchment-deep),
      0 20px 80px rgba(0, 0, 0, 0.9),
      inset 0 0 72px rgba(0, 0, 0, 0.32);
  }
  /* --ink is hier licht; vaste donkere panelen + donkere kaarten (niet var(--ink) als fill) */
  body.memorial-mourning-theme .today-block {
    background: #101018;
    background-image: linear-gradient(135deg, #18161f, #0c0b10);
    border-color: var(--gold-light);
    box-shadow: inset 0 0 48px rgba(0, 0, 0, 0.45), 0 4px 24px rgba(0, 0, 0, 0.55);
  }
  body.memorial-mourning-theme .today-block::before {
    border-color: rgba(196, 162, 56, 0.28);
  }
  body.memorial-mourning-theme .today-real-date {
    color: rgba(205, 200, 188, 0.52);
  }
  body.memorial-mourning-theme .month-card {
    background: linear-gradient(180deg, rgba(48, 45, 56, 0.96) 0%, rgba(32, 30, 38, 0.94) 100%);
    border-color: var(--parchment-deep);
  }
  body.memorial-mourning-theme .month-card.is-current {
    background: linear-gradient(180deg, rgba(58, 54, 68, 0.99), rgba(42, 40, 50, 0.96));
    border-color: var(--gold-light);
    box-shadow: 0 0 0 1px var(--gold), 0 4px 18px rgba(0, 0, 0, 0.45);
  }
  body.memorial-mourning-theme .leap-year-notice {
    background: rgba(40, 38, 48, 0.55);
    border-color: rgba(180, 160, 90, 0.28);
    color: var(--ink-light);
  }
  body.memorial-mourning-theme .day-cell.today-cell,
  body.memorial-mourning-theme .day-cell.birthday-today,
  body.memorial-mourning-theme .day-cell.memorial-today,
  body.memorial-mourning-theme .day-cell.memorial-death-today {
    color: #f5f2eb;
  }
  body.memorial-mourning-theme .birthday-item {
    background: linear-gradient(135deg, rgba(120, 100, 55, 0.18), rgba(42, 40, 50, 0.75));
    border-color: var(--parchment-deep);
  }
  body.memorial-mourning-theme .birthday-item.is-today {
    border-color: var(--gold-light);
    background: linear-gradient(135deg, rgba(184, 134, 11, 0.22), rgba(55, 52, 62, 0.88));
    box-shadow: 0 0 0 1px var(--gold);
  }
  body.memorial-mourning-theme .memorial-item {
    background: linear-gradient(135deg, rgba(50, 55, 72, 0.45), rgba(38, 36, 46, 0.82));
    border-color: rgba(90, 95, 115, 0.5);
  }
  body.memorial-mourning-theme .memorial-item.is-today {
    border-color: rgba(120, 140, 180, 0.75);
    background: linear-gradient(135deg, rgba(70, 85, 120, 0.35), rgba(45, 48, 58, 0.9));
    box-shadow: 0 0 0 1px rgba(100, 120, 165, 0.45);
  }
  body.memorial-mourning-theme .memorial-item--death {
    background: linear-gradient(135deg, rgba(24, 24, 30, 0.6), rgba(42, 40, 48, 0.78));
    border-color: rgba(65, 65, 78, 0.55);
  }
  body.memorial-mourning-theme .memorial-item--death.is-today {
    border-color: rgba(95, 95, 108, 0.8);
    background: linear-gradient(135deg, rgba(32, 32, 40, 0.75), rgba(50, 48, 58, 0.88));
    box-shadow: 0 0 0 1px rgba(75, 75, 88, 0.5);
  }
  body.memorial-mourning-theme .calendar-debug-bar {
    background: linear-gradient(135deg, #14121a, #1c1a24);
    border-color: rgba(180, 160, 90, 0.35);
  }
  body.memorial-mourning-theme .calendar-debug-bar button {
    color: #ebe7de;
    background: rgba(90, 80, 50, 0.35);
  }
  body.memorial-mourning-theme .calendar-debug-bar button:hover {
    background: rgba(120, 105, 60, 0.45);
  }
  body.memorial-mourning-theme::before {
    mix-blend-mode: screen;
    opacity: 0.35;
    background-image:
      radial-gradient(1px 1px at 15% 22%, rgba(200, 200, 210, 0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 42% 55%, rgba(160, 160, 175, 0.15) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 78% 18%, rgba(220, 220, 230, 0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 62% 78%, rgba(140, 140, 155, 0.12) 0%, transparent 100%);
  }
  body.memorial-mourning-theme::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 100% 35% at 50% 100%, rgba(0, 0, 0, 0.55) 0%, transparent 55%);
  }

  /* Verjaardag — feestelijke achtergrond (alleen als er géén feestdag-actief thema is) */
  body.birthday-theme {
    background-color: #140a18;
    background-image:
      radial-gradient(ellipse 75% 55% at 15% 25%, rgba(255, 120, 200, 0.4) 0%, transparent 50%),
      radial-gradient(ellipse 65% 50% at 88% 20%, rgba(120, 210, 255, 0.35) 0%, transparent 48%),
      radial-gradient(ellipse 90% 60% at 50% 105%, rgba(255, 220, 100, 0.28) 0%, transparent 45%),
      radial-gradient(ellipse 50% 40% at 70% 70%, rgba(180, 100, 255, 0.2) 0%, transparent 42%),
      linear-gradient(168deg, #200818 0%, #0c0610 45%, #08040c 100%);
    --garland-rope: #ff9ec8;
    --garland-rope-op: 0.93;
    --garland-stroke-w: 1.7;
    --garland-gem-a: #ffe566;
    --garland-gem-b: #ff5c9a;
    --garland-star: #7fffd4;
    --garland-ornament: #fff3a0;
    --garland-corner: #ff77dd;
    --garland-filter: drop-shadow(0 0 6px rgba(255, 140, 200, 0.6)) saturate(1.25);
    --garland-dash: 2 6;
    --garland-linecap: round;
  }
  body.birthday-theme::before {
    mix-blend-mode: screen;
    opacity: 0.92;
    background-image:
      radial-gradient(2px 2px at 10% 12%, rgba(255, 200, 255, 0.95) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 22% 35%, rgba(255, 255, 150, 0.85) 0%, transparent 100%),
      radial-gradient(2px 2px at 55% 8%, rgba(150, 255, 255, 0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 28%, rgba(255, 150, 200, 0.8) 0%, transparent 100%),
      radial-gradient(2px 2px at 40% 65%, rgba(255, 220, 120, 0.75) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 92% 52%, rgba(200, 180, 255, 0.88) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 78%, rgba(255, 255, 200, 0.7) 0%, transparent 100%),
      radial-gradient(2px 2px at 68% 88%, rgba(255, 180, 255, 0.85) 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 48%, rgba(180, 255, 220, 0.65) 0%, transparent 100%),
      radial-gradient(2px 2px at 30% 92%, rgba(255, 240, 180, 0.9) 0%, transparent 100%);
  }
  body.birthday-theme::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(circle 35vw at 25% 35%, rgba(255, 215, 120, 0.14) 0%, transparent 45%),
      radial-gradient(circle 40vw at 75% 55%, rgba(255, 130, 220, 0.1) 0%, transparent 48%);
  }

  body[class*="fest-theme-"] .garland-svg,
  body.birthday-theme .garland-svg,
  body.memorial-theme .garland-svg,
  body.memorial-mourning-theme .garland-svg { opacity: 0.94; }

  /* Vlaggenlijn alleen bij verjaardagsthema */
  .birthday-bunting {
    position: fixed;
    left: 0;
    right: 0;
    width: 100%;
    height: clamp(32px, 5.5vw, 44px);
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .birthday-bunting--top { top: 0; }
  .birthday-bunting--bottom { bottom: 0; }
  body.birthday-theme .birthday-bunting { opacity: 1; }

  /* ——— GARLAND ——— */
  .garland-svg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
    overflow: visible;
    filter: var(--garland-filter);
    transition: filter 0.85s ease, opacity 0.85s ease;
  }
  .garland-svg path.garland-rope {
    fill: none;
    stroke: var(--garland-rope);
    stroke-width: var(--garland-stroke-w);
    opacity: var(--garland-rope-op);
    stroke-linecap: var(--garland-linecap);
    stroke-dasharray: var(--garland-dash);
  }
  .garland-svg .gar-gem-a { fill: var(--garland-gem-a); }
  .garland-svg .gar-gem-b { fill: var(--garland-gem-b); }
  .garland-svg .gar-star { fill: var(--garland-star); }
  .garland-svg .gar-ornament { fill: var(--garland-ornament); }
  .garland-svg .gar-corner { fill: var(--garland-corner); }
  .garland-svg .gar-ornament,
  .garland-svg .gar-corner {
    font-family: 'IM Fell English', 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', serif;
  }
  .garland-svg[data-garland="midsummer"] .gar-ornament { font-size: 15px; }
  .garland-svg[data-garland="feastofthemoon"] .gar-ornament { font-size: 16px; }
  .garland-svg[data-garland="birthday"] .gar-ornament { font-size: 15px; }
  .garland-svg[data-garland="memorial"] .gar-ornament { font-size: 14px; }
  .garland-svg[data-garland="memorial-mourning"] .gar-ornament { font-size: 13px; }

  .page { position: relative; z-index: 3; max-width: 860px; width: 100%; }

  /* Scroll */
  .scroll {
    background: var(--parchment);
    background-image: radial-gradient(ellipse at 50% 0%, #fffae8 0%, var(--parchment) 40%);
    border-radius: 4px;
    box-shadow:
      0 0 0 3px var(--parchment-deep),
      0 0 0 6px var(--gold),
      0 0 0 8px var(--parchment-deep),
      0 20px 80px rgba(0,0,0,0.8),
      inset 0 0 60px rgba(180,140,60,0.15);
    padding: 50px 55px 55px;
    position: relative;
    overflow: hidden;
  }
  .scroll::before { content:'✦'; position:absolute; top:18px; left:22px; font-size:28px; color:var(--gold); opacity:0.6; }
  .scroll::after  { content:'✦'; position:absolute; bottom:18px; right:22px; font-size:28px; color:var(--gold); opacity:0.6; }

  /* Title */
  .title-block { text-align:center; margin-bottom:36px; padding-bottom:28px; border-bottom:2px solid var(--gold); position:relative; user-select:none; -webkit-user-select:none; }
  .title-block::after { content:'⸻ ✦ ⸻'; display:block; color:var(--gold); font-size:14px; letter-spacing:6px; margin-top:12px; }
  .scroll-title {
    font-family:'Cinzel Decorative', serif;
    font-size: clamp(20px, 4vw, 32px);
    color: var(--crimson);
    text-shadow: 1px 1px 0 var(--parchment-deep), 0 0 30px rgba(139,26,26,0.3);
    letter-spacing: 2px; margin-bottom: 4px; line-height: 1.3;
  }
  .scroll-subtitle { font-family:'Cinzel', serif; font-size:13px; color:var(--ink-light); letter-spacing:4px; text-transform:uppercase; }

  /* Birthday banner */
  .birthday-banner {
    background: linear-gradient(135deg, #1a0800, #2d1200, #1a0800);
    border: 1px solid var(--gold-light);
    border-radius: 3px;
    padding: 14px 20px;
    margin-bottom: 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
    animation: bannerPulse 3s ease-in-out infinite;
  }
  .birthday-banner::before {
    content: '🎉 🎂 🎊 🎈 🎉 🎂 🎊 🎈 🎉 🎂 🎊 🎈';
    position: absolute; top: 4px; left: 0; right: 0;
    font-size: 11px; letter-spacing: 2px; opacity: 0.5;
  }
  @keyframes bannerPulse {
    0%,100% { box-shadow: 0 0 10px rgba(184,134,11,0.3); }
    50%      { box-shadow: 0 0 30px rgba(184,134,11,0.7); }
  }
  .birthday-banner-text { font-family:'Cinzel Decorative',serif; font-size:15px; color:var(--gold-pale); text-shadow:0 0 20px rgba(240,208,96,0.6); margin-top:14px; }

  .memorial-banner {
    background: linear-gradient(135deg, #0c1018, #141c28, #0c1018);
    border: 1px solid rgba(138, 158, 196, 0.55);
    border-radius: 3px;
    padding: 12px 18px;
    margin-bottom: 12px;
    text-align: center;
    position: relative;
    overflow: hidden;
    animation: memorialBannerGlow 4.5s ease-in-out infinite;
  }
  .memorial-banner::before {
    content: '✦ · ✦ · ✦';
    position: absolute; top: 5px; left: 0; right: 0;
    font-size: 10px; letter-spacing: 6px; opacity: 0.35; color: rgba(200, 215, 245, 0.9);
  }
  @keyframes memorialBannerGlow {
    0%, 100% { box-shadow: 0 0 8px rgba(100, 130, 180, 0.25); }
    50%      { box-shadow: 0 0 22px rgba(130, 160, 210, 0.4); }
  }
  .memorial-banner-text { font-family:'Cinzel Decorative',serif; font-size:14px; color:#d8e4f8; text-shadow:0 0 16px rgba(180,200,240,0.45); margin-top:12px; line-height:1.35; }
  .memorial-banner-sub { font-family:'IM Fell English',serif; font-size:11px; font-style:italic; color:rgba(200,215,245,0.65); margin-top:6px; }

  .memorial-banner--mourning {
    background: linear-gradient(135deg, #0a0a0c, #121218, #0a0a0c);
    border-color: rgba(90, 90, 100, 0.5);
    animation: memorialMourningBanner 5s ease-in-out infinite;
  }
  .memorial-banner--mourning::before {
    content: '· · ·';
    letter-spacing: 10px;
    opacity: 0.28;
    color: rgba(180, 180, 190, 0.5);
  }
  @keyframes memorialMourningBanner {
    0%, 100% { box-shadow: 0 0 6px rgba(0, 0, 0, 0.6); }
    50%      { box-shadow: 0 0 14px rgba(40, 40, 48, 0.35); }
  }
  .memorial-banner--mourning .memorial-banner-text {
    color: #c8c8d2;
    text-shadow: 0 0 12px rgba(100, 100, 115, 0.35);
  }
  .memorial-banner--mourning .memorial-banner-sub {
    color: rgba(150, 150, 162, 0.55);
  }

  /* Today */
  .today-block {
    background: var(--ink);
    background-image: linear-gradient(135deg, #1a0a00, #0d0500);
    border: 1px solid var(--gold);
    border-radius: 3px;
    padding: 30px 35px;
    margin-bottom: 35px;
    position: relative;
    box-shadow: inset 0 0 40px rgba(180,130,0,0.08), 0 4px 20px rgba(0,0,0,0.4);
    text-align: center;
  }
  .today-block::before {
    content:''; position:absolute; top:6px; left:6px; right:6px; bottom:6px;
    border:1px solid rgba(184,134,11,0.25); border-radius:2px; pointer-events:none;
  }
  .today-label { font-family:'Cinzel',serif; font-size:11px; letter-spacing:5px; text-transform:uppercase; color:var(--gold); opacity:0.7; margin-bottom:10px; }
  .today-dnd-date { font-family:'Cinzel Decorative',serif; font-size:clamp(22px,5vw,38px); color:var(--gold-pale); text-shadow:0 0 20px rgba(240,208,96,0.4); line-height:1.2; margin-bottom:6px; }
  .today-moon { font-family:'IM Fell English',serif; font-style:italic; font-size:16px; color:var(--moon-yellow); opacity:0.85; margin-bottom:14px; }
  .today-real-date { font-family:'Cinzel',serif; font-size:12px; color:rgba(244,232,193,0.4); letter-spacing:3px; }
  .moon-symbol { font-size:28px; display:block; margin-bottom:8px; filter:drop-shadow(0 0 8px rgba(245,226,122,0.5)); }

  /* Section label */
  .section-label { font-family:'Cinzel',serif; font-size:11px; letter-spacing:5px; text-transform:uppercase; color:var(--ink-light); text-align:center; margin-bottom:20px; }

  /* Month cards */
  .months-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:16px; margin-bottom:30px; }
  .month-card {
    background: linear-gradient(180deg, rgba(255,250,232,0.6) 0%, rgba(244,232,193,0.4) 100%);
    border: 1px solid var(--parchment-deep); border-radius:2px; padding:14px 16px; position:relative;
  }
  .month-card.is-current { border-color:var(--gold); background:linear-gradient(180deg, rgba(255,250,220,0.9), rgba(244,232,175,0.8)); box-shadow:0 0 0 1px var(--gold-light), 0 4px 16px rgba(184,134,11,0.2); }
  .month-card.is-current::before { content:'◆'; position:absolute; top:8px; right:10px; font-size:8px; color:var(--gold); }
  .month-name { font-family:'Cinzel',serif; font-size:15px; font-weight:600; color:var(--crimson); margin-bottom:4px; }
  .month-days { font-family:'IM Fell English',serif; font-size:12px; color:var(--ink-fade); font-style:italic; margin-bottom:8px; }

  /* Day grid — Harptos tenday: 10 dagen per rij (3 rijen voor 30 dagen) */
  .day-grid { display:grid; grid-template-columns:repeat(10,1fr); gap:2px; margin-top:8px; }

  /* Subtiele schrikkeljaar-melding (Gregoriaans) */
  .leap-year-notice {
    font-family:'IM Fell English',serif;
    font-size:11px;
    font-style:italic;
    color:var(--ink-light);
    text-align:center;
    padding:8px 12px;
    margin-bottom:14px;
    border:1px solid rgba(184,134,11,0.22);
    border-radius:2px;
    background:rgba(244,232,193,0.2);
    line-height:1.45;
    opacity:0.92;
  }
  .day-cell {
    aspect-ratio:1; display:flex; align-items:center; justify-content:center;
    font-family:'Cinzel',serif; font-size:9px; color:var(--ink-fade);
    border-radius:1px; cursor:default; position:relative;
  }
  .day-cell.today-cell { background:var(--crimson); color:var(--parchment); font-weight:700; border-radius:50%; box-shadow:0 0 6px rgba(139,26,26,0.5); }
  /* Maanfases: donkere cijfers + zachte schijf (alleen zonder today/jarige-highlight) */
  .day-cell.full-moon:not(.today-cell):not(.birthday-today):not(.memorial-today):not(.memorial-death-today) {
    color:#5c4200;
    font-weight:700;
    border-radius:50%;
    background:radial-gradient(circle at 50% 45%, rgba(255, 220, 120, 0.55) 0%, rgba(255, 200, 70, 0.22) 42%, rgba(255, 190, 60, 0.08) 62%, transparent 68%);
    box-shadow:inset 0 0 0 1px rgba(184, 134, 11, 0.2);
  }
  /* New moon: warm sepia / umber (niet koel grijs) */
  .day-cell.new-moon:not(.today-cell):not(.birthday-today):not(.memorial-today):not(.memorial-death-today) {
    color:#5a3818;
    font-weight:700;
    border-radius:50%;
    background:radial-gradient(circle at 50% 48%, rgba(140, 100, 62, 0.22) 0%, rgba(100, 72, 48, 0.11) 40%, rgba(85, 62, 42, 0.05) 55%, transparent 68%);
    box-shadow:inset 0 0 0 1px rgba(120, 85, 50, 0.28);
  }
  /* Dark moon: koel leisteengrijs / nachtblauw (niet bruin) */
  .day-cell.dark-moon:not(.today-cell):not(.birthday-today):not(.memorial-today):not(.memorial-death-today) {
    color:#2e3d4d;
    font-weight:600;
    border-radius:50%;
    background:radial-gradient(circle at 50% 50%, rgba(55, 72, 92, 0.22) 0%, rgba(65, 82, 102, 0.12) 42%, rgba(70, 88, 108, 0.05) 58%, transparent 72%);
    box-shadow:inset 0 0 0 1px rgba(45, 62, 82, 0.22);
  }
  /* Tussenfasen: "(Rising)" / "(Fading)" — lichtere schijf + iets transparanter */
  .day-cell.full-moon.moon-transition:not(.today-cell):not(.birthday-today):not(.memorial-today):not(.memorial-death-today) {
    opacity:0.88;
    color:#6b5220;
    background:radial-gradient(circle at 50% 45%, rgba(255, 220, 120, 0.32) 0%, rgba(255, 200, 70, 0.12) 42%, rgba(255, 190, 60, 0.04) 62%, transparent 68%);
    box-shadow:inset 0 0 0 1px rgba(184, 134, 11, 0.12);
  }
  .day-cell.new-moon.moon-transition:not(.today-cell):not(.birthday-today):not(.memorial-today):not(.memorial-death-today) {
    opacity:0.86;
    color:#6e5230;
    background:radial-gradient(circle at 50% 48%, rgba(140, 100, 62, 0.12) 0%, rgba(100, 72, 48, 0.06) 40%, transparent 62%);
    box-shadow:inset 0 0 0 1px rgba(120, 85, 50, 0.16);
  }
  .day-cell.dark-moon.moon-transition:not(.today-cell):not(.birthday-today):not(.memorial-today):not(.memorial-death-today) {
    opacity:0.86;
    color:#4a5d6e;
    background:radial-gradient(circle at 50% 50%, rgba(55, 72, 92, 0.12) 0%, rgba(65, 82, 102, 0.06) 42%, transparent 65%);
    box-shadow:inset 0 0 0 1px rgba(45, 62, 82, 0.12);
  }

  /* Birthday day — small cake pip, no layout shift */
  .day-cell.birthday-day .cake-pip {
    position:absolute; top:-1px; right:-1px; font-size:7px; line-height:1; pointer-events:none;
  }
  .day-cell.birthday-today {
    background: linear-gradient(135deg, #8b1a1a, #b8860b);
    color: var(--parchment); font-weight:700; border-radius:50%;
    box-shadow: 0 0 10px rgba(184,134,11,0.7);
  }

  .day-cell .memorial-pip--celebration {
    position:absolute; bottom:-1px; right:-1px; font-size:7px; line-height:1; pointer-events:none;
    color: #3d4a6e;
    text-shadow: 0 0 3px rgba(180, 200, 240, 0.5);
  }
  .day-cell .memorial-pip--death {
    position:absolute; bottom:-1px; left:-1px; font-size:8px; line-height:1; pointer-events:none;
    color: #2c2c32;
    text-shadow: 0 0 4px rgba(80, 80, 92, 0.45);
  }
  .day-cell.memorial-today {
    background: linear-gradient(135deg, #2a3550, #4a5a78);
    color: var(--parchment); font-weight:700; border-radius:50%;
    box-shadow: 0 0 10px rgba(130, 160, 210, 0.55);
  }
  .day-cell.memorial-death-today {
    background: linear-gradient(135deg, #1a1a1e, #2e2e36);
    color: #d8d8e0; font-weight:700; border-radius:50%;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.85), inset 0 0 0 1px rgba(90, 90, 102, 0.4);
  }

  /* Tooltip */
  .day-cell[title] { cursor:pointer; }
  .day-cell[title]:hover::after {
    content: attr(title);
    position:absolute; bottom:calc(100% + 4px); left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--parchment); font-family:'Cinzel',serif; font-size:9px;
    padding:3px 6px; border-radius:2px; white-space:nowrap; z-index:10;
    pointer-events:none; border:1px solid var(--gold);
  }

  /* Legend */
  .legend {
    display:flex; flex-wrap:wrap; justify-content:center; gap:16px;
    padding:20px 0 24px; border-bottom:1px solid var(--parchment-deep); margin-bottom:28px;
  }
  .legend-item { display:flex; align-items:center; gap:6px; font-family:'IM Fell English',serif; font-size:12px; color:var(--ink-fade); font-style:italic; }
  .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

  /* ——— FEESTDAG-KAARTEN (in jaarlijst) ——— */
  .special-card {
    border-radius:4px; padding:16px 14px 14px; text-align:center;
    position:relative; overflow:hidden; border:1px solid transparent;
    transition:transform 0.15s;
  }
  .special-card-markers {
    position:absolute; inset:0; pointer-events:none; z-index:3;
  }
  .special-card-markers .sc-marker-cake {
    position:absolute; top:6px; right:8px; font-size:11px; line-height:1;
    filter:drop-shadow(0 0 2px rgba(0,0,0,0.35));
  }
  .special-card-markers .sc-marker-death {
    position:absolute; bottom:8px; left:8px; font-size:12px; line-height:1;
    filter:drop-shadow(0 0 2px rgba(0,0,0,0.4));
  }
  .special-card-markers .sc-marker-celebration {
    position:absolute; bottom:8px; right:8px; font-size:10px; line-height:1;
    color:#4a5a78;
    filter:drop-shadow(0 0 2px rgba(200,210,240,0.5));
  }
  .special-card:hover { transform:translateY(-2px); }
  .special-card.is-current { outline: 2px solid #fff; outline-offset:2px; }

  .s-icon { font-size:28px; display:block; margin-bottom:8px; position:relative; }
  .s-name { font-family:'Cinzel',serif; font-size:12px; font-weight:600; margin-bottom:4px; position:relative; }
  .s-moon { font-family:'IM Fell English',serif; font-size:10px; font-style:italic; position:relative; }
  .special-card .s-real-date { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.04em; color:rgba(244,232,213,0.78); margin-bottom:6px; position:relative; }

  /* Midwinter — icy blue */
  .special-midwinter { background:linear-gradient(160deg,#0e1a2e,#162840,#0e1a2e); border-color:#4a90c4; box-shadow:0 0 16px rgba(74,144,196,0.2); }
  .special-midwinter::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(255,255,255,0.02) 8px,rgba(255,255,255,0.02) 9px); }
  .special-midwinter .s-name { color:#a8d4f0; text-shadow:0 0 10px rgba(168,212,240,0.5); }
  .special-midwinter .s-moon { color:rgba(168,212,240,0.6); }
  .special-midwinter .s-icon { filter:drop-shadow(0 0 6px #4a90c4); }

  /* Greengrass — spring green */
  .special-greengrass { background:linear-gradient(160deg,#0d1e0e,#162b12,#0d1e0e); border-color:#4caf50; box-shadow:0 0 16px rgba(76,175,80,0.2); }
  .special-greengrass::after { content:'✿ ✾ ✿'; position:absolute; bottom:3px; left:0; right:0; font-size:9px; color:rgba(165,214,167,0.25); letter-spacing:4px; text-align:center; }
  .special-greengrass .s-name { color:#a5d6a7; text-shadow:0 0 10px rgba(165,214,167,0.5); }
  .special-greengrass .s-moon { color:rgba(165,214,167,0.6); }
  .special-greengrass .s-icon { filter:drop-shadow(0 0 6px #4caf50); }

  /* Midsummer — golden sun */
  .special-midsummer { background:linear-gradient(160deg,#1e1400,#2e1e00,#1e1400); border-color:#f0b000; box-shadow:0 0 20px rgba(240,176,0,0.25); }
  .special-midsummer .s-name { color:#ffe082; text-shadow:0 0 12px rgba(255,224,130,0.7); }
  .special-midsummer .s-moon { color:rgba(255,224,130,0.6); }
  .special-midsummer .s-icon { animation:sunPulse 3s ease-in-out infinite; }
  @keyframes sunPulse { 0%,100% { filter:drop-shadow(0 0 6px #f0b000); } 50% { filter:drop-shadow(0 0 18px #ffd740); } }

  /* Highharvestide — amber harvest */
  .special-highharvestide { background:linear-gradient(160deg,#1e1000,#2e1800,#1e1000); border-color:#d4700a; box-shadow:0 0 16px rgba(212,112,10,0.2); }
  .special-highharvestide::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 100%,rgba(212,112,10,0.12),transparent 70%); }
  .special-highharvestide .s-name { color:#ffcc80; text-shadow:0 0 10px rgba(255,204,128,0.5); }
  .special-highharvestide .s-moon { color:rgba(255,204,128,0.6); }
  .special-highharvestide .s-icon { filter:drop-shadow(0 0 6px #d4700a); }

  /* Feast of the Moon — silver moonlight */
  .special-feastofthemoon { background:linear-gradient(160deg,#0f0f1e,#191928,#0f0f1e); border-color:#9e9ecf; box-shadow:0 0 16px rgba(158,158,207,0.25); }
  .special-feastofthemoon::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%,rgba(158,158,207,0.1),transparent 60%); }
  .special-feastofthemoon .s-name { color:#d1d1f0; text-shadow:0 0 10px rgba(209,209,240,0.6); }
  .special-feastofthemoon .s-moon { color:rgba(209,209,240,0.6); }
  .special-feastofthemoon .s-icon { animation:moonGlow 4s ease-in-out infinite; }
  @keyframes moonGlow { 0%,100% { filter:drop-shadow(0 0 4px #9e9ecf); } 50% { filter:drop-shadow(0 0 14px #d1d1f0); } }

  /* Ornate divider */
  .ornate-divider { text-align:center; color:var(--gold); font-size:13px; letter-spacing:8px; margin:24px 0; opacity:0.6; }

  /* Birthdays */
  .birthday-list { display:grid; grid-template-columns:repeat(auto-fill, minmax(190px,1fr)); gap:10px; margin-bottom:10px; }
  .birthday-item {
    background: linear-gradient(135deg,rgba(184,134,11,0.06),rgba(244,232,193,0.5));
    border:1px solid var(--parchment-deep); border-radius:2px; padding:10px 14px;
    display:flex; align-items:center; gap:10px;
  }
  .birthday-item.is-today { border-color:var(--gold); background:linear-gradient(135deg,rgba(184,134,11,0.15),rgba(244,232,175,0.7)); box-shadow:0 0 0 1px var(--gold-light); }
  .birthday-icon { font-size:18px; flex-shrink:0; }
  .birthday-name { font-family:'Cinzel',serif; font-size:12px; font-weight:600; color:var(--ink); }
  .birthday-date { font-family:'IM Fell English',serif; font-size:11px; font-style:italic; color:var(--ink-light); }

  /* Subtiele feestdag-FX (onder confetti) */
  #fest-fx-canvas { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:998; }
  /* Confetti (verjaardag) */
  #confetti-canvas { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:999; }

  /* Debug: simulatie van “vandaag” (alleen als debugCalendarActive true — zie SETTINGS + title-block tap-toggle) */
  .calendar-debug-bar {
    background: linear-gradient(135deg, #1a0e08, #2d1810);
    border: 1px solid var(--gold-light);
    color: var(--gold-pale);
    padding: 10px 14px;
    margin-bottom: 16px;
    border-radius: 3px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .calendar-debug-bar .debug-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .calendar-debug-bar button {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 6px 12px;
    border-radius: 2px;
    border: 1px solid var(--gold);
    background: rgba(184, 134, 11, 0.2);
    color: var(--parchment);
    cursor: pointer;
  }
  .calendar-debug-bar button:hover { background: rgba(184, 134, 11, 0.35); }
  .special-card.debug-clickable,
  .birthday-item.debug-clickable { cursor: pointer; }
  .special-card.debug-clickable:focus-visible,
  .birthday-item.debug-clickable:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .memorial-list { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:10px; margin-bottom:10px; }
  .memorial-item {
    background: linear-gradient(135deg, rgba(60, 80, 120, 0.08), rgba(244, 232, 193, 0.45));
    border: 1px solid rgba(90, 110, 150, 0.35); border-radius: 2px; padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .memorial-item.is-today { border-color: rgba(130, 160, 210, 0.85); background: linear-gradient(135deg, rgba(80, 110, 160, 0.12), rgba(230, 235, 250, 0.55)); box-shadow: 0 0 0 1px rgba(130, 160, 210, 0.4); }
  .memorial-item--death {
    background: linear-gradient(135deg, rgba(20, 20, 26, 0.12), rgba(200, 200, 210, 0.2));
    border-color: rgba(55, 55, 65, 0.45);
  }
  .memorial-item--death.is-today {
    border-color: rgba(90, 90, 102, 0.75);
    background: linear-gradient(135deg, rgba(30, 30, 38, 0.2), rgba(210, 210, 220, 0.38));
    box-shadow: 0 0 0 1px rgba(70, 70, 82, 0.45);
  }
  .memorial-icon { font-size: 16px; flex-shrink: 0; opacity: 0.9; }
  .memorial-title { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600; color: var(--ink); line-height: 1.3; }
  .memorial-date { font-family: 'IM Fell English', serif; font-size: 11px; font-style: italic; color: var(--ink-light); }
  .memorial-item.debug-clickable { cursor: pointer; }
  .memorial-item.debug-clickable:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  @media (max-width:600px) {
    /* Meer marge t.o.v. de viewport zodat de vaste garland-rand (SVG) zichtbaar blijft naast de perkamentkolom. */
    body {
      padding: 60px;
      padding-left: clamp(26px, 8.5vw, 44px);
      padding-right: clamp(26px, 8.5vw, 44px);
    }
    .scroll { padding: 28px clamp(14px, 4vw, 22px) 34px; }
    /* Eén maand per rij; tenday blijft 10 kolommen (geen 5-koloms override). */
    .months-grid { grid-template-columns:1fr; }
  }
</style>
</head>
